<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRs Needing My Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 24px;
      padding-bottom: 80px;
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 { font-size: 24px; font-weight: 600; }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    .btn:hover { background: #30363d; }
    .btn.active { background: #1f6feb; border-color: #1f6feb; }

    .stats { font-size: 13px; color: #8b949e; }

    .repo-group {
      margin-bottom: 20px;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .repo-header {
      background: #161b22;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .repo-header:hover { background: #1c2128; }

    .repo-header a { color: #58a6ff; text-decoration: none; }
    .repo-header a:hover { text-decoration: underline; }

    .repo-count {
      background: #30363d;
      color: #8b949e;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .pr-list { list-style: none; }

    .pr-item {
      padding: 10px 16px;
      border-top: 1px solid #21262d;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: default;
    }

    .pr-item:hover { background: #161b22; }
    .pr-item.selected { background: #1a2332; }

    .pr-checkbox {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      margin-top: 3px;
      accent-color: #1f6feb;
      cursor: pointer;
    }

    .pr-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      margin-top: 2px;
    }

    .pr-icon.open { color: #3fb950; }
    .pr-body { flex: 1; min-width: 0; }

    .pr-title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pr-title {
      color: #e6edf3;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }

    .pr-title:hover { color: #58a6ff; text-decoration: underline; }

    .pr-number { color: #8b949e; font-size: 13px; }

    .review-badge {
      background: rgba(31, 111, 235, 0.18);
      color: #58a6ff;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .author-badge {
      background: rgba(139, 148, 158, 0.18);
      color: #c9d1d9;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .sleep-badge {
      background: rgba(210, 153, 34, 0.2);
      color: #d29922;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .label {
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .pr-meta {
      font-size: 12px;
      color: #8b949e;
      margin-top: 3px;
    }

    .wake-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      margin-left: 8px;
    }

    .wake-btn:hover { background: #21262d; color: #e6edf3; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
      font-size: 15px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { text-align: center; padding: 40px; color: #f85149; }

    .collapsed .pr-list { display: none; }
    .collapsed .collapse-icon { transform: rotate(-90deg); }

    .collapse-icon {
      transition: transform 0.15s;
      color: #8b949e;
      font-size: 12px;
    }

    .repo-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.2s ease;
    }

    .action-bar.visible { transform: translateY(0); }

    .action-bar .count {
      font-size: 14px;
      font-weight: 500;
    }

    .action-bar .sleep-btn {
      background: #d29922;
      border: none;
      color: #0d1117;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .action-bar .sleep-btn:hover { background: #e3b341; }

    .action-bar .clear-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .action-bar .clear-btn:hover { background: #21262d; color: #e6edf3; }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 28px 0 12px;
    }

    .pr-item.sleeping { opacity: 0.6; }
  </style>
</head>
<body>
  <header>
    <h1>PRs Needing My Review</h1>
    <div class="controls">
      <span class="stats" id="stats"></span>
      <button class="btn" id="sortBtn" title="Toggle sort order">Oldest first</button>
      <button class="btn" id="sleepToggle">Sleeping</button>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>
  </header>
  <main id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>Fetching PRs...</div>
    </div>
  </main>
  <div class="action-bar" id="actionBar">
    <span class="count" id="selCount"></span>
    <button class="sleep-btn" id="sleepSelectedBtn">Sleep 1 week</button>
    <button class="clear-btn" id="clearSelBtn">Clear</button>
  </div>

  <script>
    let allPRs = [];
    let sleepData = {};
    let showSleeping = false;
    let oldestFirst = true;
    let selected = new Set();
    let lastClickedKey = null;
    let renderedKeys = [];

    const app = document.getElementById("app");
    const sleepToggle = document.getElementById("sleepToggle");
    const sortBtn = document.getElementById("sortBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const stats = document.getElementById("stats");
    const actionBar = document.getElementById("actionBar");
    const selCount = document.getElementById("selCount");
    const sleepSelectedBtn = document.getElementById("sleepSelectedBtn");
    const clearSelBtn = document.getElementById("clearSelBtn");

    function prKey(pr) {
      return `${pr.repository.nameWithOwner}#${pr.number}`;
    }

    function isSleeping(pr) {
      const entry = sleepData[prKey(pr)];
      if (!entry) return false;
      return new Date(entry.until).getTime() > Date.now();
    }

    function sleepRemaining(pr) {
      const entry = sleepData[prKey(pr)];
      if (!entry) return "";

      const ms = new Date(entry.until).getTime() - Date.now();
      if (ms <= 0) return "";

      const days = Math.ceil(ms / (24 * 60 * 60 * 1000));
      return `${days}d left`;
    }

    async function fetchPRs() {
      app.innerHTML = '<div class="loading"><div class="spinner"></div><div>Fetching PRs...</div></div>';

      try {
        const [prRes, sleepRes] = await Promise.all([
          fetch("/api/prs"),
          fetch("/api/sleep"),
        ]);

        if (!prRes.ok) {
          throw new Error("Failed to fetch PRs");
        }

        allPRs = await prRes.json();
        sleepData = await sleepRes.json();
        selected.clear();
        updateActionBar();
        render();
      } catch (e) {
        app.innerHTML = '<div class="error">Failed to load PRs. Check that `gh` is installed and authenticated.</div>';
      }
    }

    async function sleepPRs(keys, days) {
      const res = await fetch("/api/sleep", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keys, days }),
      });

      sleepData = await res.json();
      selected.clear();
      updateActionBar();
      render();
    }

    async function wakePR(key) {
      const res = await fetch(`/api/sleep/${encodeURIComponent(key)}`, { method: "DELETE" });
      sleepData = await res.json();
      render();
    }

    function timeAgo(dateStr) {
      const seconds = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (seconds < 60) return "just now";

      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;

      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;

      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;

      const months = Math.floor(days / 30);
      return `${months}mo ago`;
    }

    function getLabelStyle(label) {
      const hex = label.color;
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return `background: rgba(${r},${g},${b},0.2); color: #${hex}; border-color: rgba(${r},${g},${b},0.4);`;
    }

    function prIcon() {
      return `<svg class="pr-icon open" viewBox="0 0 16 16" fill="currentColor">
        <path d="M7.177 3.073L9.573.677A.25.25 0 0 1 10 .854v4.792a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354zM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zm-2.25.75a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25zM11 2.5h-1V4h1a1 1 0 0 1 1 1v5.628a2.251 2.251 0 1 0 1.5 0V5A2.5 2.5 0 0 0 11 2.5zm1 10.25a.75.75 0 1 1 1.5 0 .75.75 0 0 1-1.5 0zM3.75 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5z"/>
      </svg>`;
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    function updateActionBar() {
      const count = selected.size;
      actionBar.classList.toggle("visible", count > 0);
      selCount.textContent = `${count} PR${count === 1 ? "" : "s"} selected`;
    }

    function handleCheckboxClick(key, e) {
      e.stopPropagation();

      if (e.shiftKey && lastClickedKey && lastClickedKey !== key) {
        const startIdx = renderedKeys.indexOf(lastClickedKey);
        const endIdx = renderedKeys.indexOf(key);

        if (startIdx !== -1 && endIdx !== -1) {
          const lo = Math.min(startIdx, endIdx);
          const hi = Math.max(startIdx, endIdx);

          for (let i = lo; i <= hi; i += 1) {
            selected.add(renderedKeys[i]);
          }
        }
      } else if (selected.has(key)) {
        selected.delete(key);
      } else {
        selected.add(key);
      }

      lastClickedKey = key;
      updateActionBar();
      updateCheckboxes();
    }

    function handleRowClick(key, e) {
      if (e.target.closest("a") || e.target.closest(".wake-btn")) {
        return;
      }

      handleCheckboxClick(key, e);
    }

    function updateCheckboxes() {
      document.querySelectorAll(".pr-item[data-key]").forEach((el) => {
        const key = el.dataset.key;
        const checkbox = el.querySelector(".pr-checkbox");
        const isSelected = selected.has(key);

        if (checkbox) {
          checkbox.checked = isSelected;
        }

        el.classList.toggle("selected", isSelected);
      });
    }

    function renderGroup(repo, prs, isSleepSection) {
      return `
        <div class="repo-group" data-repo="${repo}">
          <div class="repo-header" onclick="toggleGroup(this)">
            <div class="repo-left">
              <span class="collapse-icon">&#9660;</span>
              <a href="https://github.com/${repo}" target="_blank" onclick="event.stopPropagation()">${repo}</a>
            </div>
            <span class="repo-count">${prs.length}</span>
          </div>
          <ul class="pr-list">
            ${prs.map((pr) => {
              const key = prKey(pr);
              const sleeping = isSleeping(pr);
              const author = pr.author ? pr.author.login : "unknown";

              return `
                <li class="pr-item ${selected.has(key) ? "selected" : ""} ${sleeping ? "sleeping" : ""}"
                    data-key="${key}" onclick="handleRowClick('${key}', event)">
                  <input type="checkbox" class="pr-checkbox"
                    ${selected.has(key) ? "checked" : ""}
                    onclick="handleCheckboxClick('${key}', event)">
                  ${prIcon()}
                  <div class="pr-body">
                    <div class="pr-title-row">
                      <a class="pr-title" href="${pr.url}" target="_blank">${escapeHtml(pr.title)}</a>
                      <span class="pr-number">#${pr.number}</span>
                      <span class="review-badge">Review requested</span>
                      <span class="author-badge">@${escapeHtml(author)}</span>
                      ${sleeping ? `<span class="sleep-badge">Sleeping ${sleepRemaining(pr)}</span>` : ""}
                      ${isSleepSection ? `<button class="wake-btn" onclick="event.stopPropagation(); wakePR('${key}')">Wake</button>` : ""}
                      ${pr.labels.map((label) => `<span class="label" style="${getLabelStyle(label)}">${escapeHtml(label.name)}</span>`).join("")}
                    </div>
                    <div class="pr-meta">
                      Opened by @${escapeHtml(author)} · Updated ${timeAgo(pr.updatedAt)} · Created ${timeAgo(pr.createdAt)}
                    </div>
                  </div>
                </li>`;
            }).join("")}
          </ul>
        </div>`;
    }

    function render() {
      const awakePRs = allPRs.filter((pr) => !isSleeping(pr));
      const sleepingPRs = allPRs.filter((pr) => isSleeping(pr));
      const sorted = [...awakePRs].sort((a, b) => {
        const aDate = new Date(a.updatedAt);
        const bDate = new Date(b.updatedAt);
        return oldestFirst ? aDate - bDate : bDate - aDate;
      });

      const groups = new Map();
      for (const pr of sorted) {
        const repo = pr.repository.nameWithOwner;
        if (!groups.has(repo)) {
          groups.set(repo, []);
        }
        groups.get(repo).push(pr);
      }

      const sortedGroups = [...groups.entries()].sort((a, b) => {
        const aDate = new Date(a[1][0].updatedAt);
        const bDate = new Date(b[1][0].updatedAt);
        return oldestFirst ? aDate - bDate : bDate - aDate;
      });

      renderedKeys = [];
      for (const [, prs] of sortedGroups) {
        for (const pr of prs) {
          renderedKeys.push(prKey(pr));
        }
      }

      const sleepGroups = new Map();
      for (const pr of sleepingPRs) {
        const repo = pr.repository.nameWithOwner;
        if (!sleepGroups.has(repo)) {
          sleepGroups.set(repo, []);
        }
        sleepGroups.get(repo).push(pr);
      }

      if (showSleeping) {
        for (const [, prs] of sleepGroups) {
          for (const pr of prs) {
            renderedKeys.push(prKey(pr));
          }
        }
      }

      stats.textContent = `${awakePRs.length} PRs (${sleepingPRs.length} sleeping)`;

      let html = "";

      if (sorted.length === 0 && (!showSleeping || sleepingPRs.length === 0)) {
        html = '<div class="loading">No PRs currently need your review.</div>';
      } else {
        html = sortedGroups.map(([repo, prs]) => renderGroup(repo, prs, false)).join("");
      }

      if (showSleeping && sleepingPRs.length > 0) {
        html += '<div class="section-label">Sleeping</div>';
        html += [...sleepGroups.entries()].map(([repo, prs]) => renderGroup(repo, prs, true)).join("");
      }

      app.innerHTML = html;
    }

    function toggleGroup(header) {
      header.parentElement.classList.toggle("collapsed");
    }

    sleepToggle.addEventListener("click", () => {
      showSleeping = !showSleeping;
      sleepToggle.classList.toggle("active", showSleeping);
      render();
    });

    sortBtn.addEventListener("click", () => {
      oldestFirst = !oldestFirst;
      sortBtn.textContent = oldestFirst ? "Oldest first" : "Newest first";
      render();
    });

    refreshBtn.addEventListener("click", fetchPRs);

    sleepSelectedBtn.addEventListener("click", () => {
      if (selected.size === 0) {
        return;
      }

      sleepPRs([...selected], 7);
    });

    clearSelBtn.addEventListener("click", () => {
      selected.clear();
      updateActionBar();
      updateCheckboxes();
    });

    fetchPRs();
  </script>
</body>
</html>
